<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Moriimise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#f6a8c4;
    --pink-deep:#e87ba6;
    --pink-soft:#fde3ec;
    --green:#b7d495;
    --green-deep:#8fb56a;
    --green-soft:#e7f2d5;
    --blue:#cfe6c4;
    --blue-soft:#eef6e4;
    --cream:#fff8f4;
    --mauve:#a06b86;
    --ink:#7c5c6e;
    --strawberry:#e2563f;
    --card:#ffffff;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:'Quicksand',sans-serif;
    color:var(--ink);
    background:
      repeating-linear-gradient(90deg,rgba(216,255,216,.35) 0 18px,transparent 18px 36px),
      repeating-linear-gradient(90deg,#f3e2ea 0 18px,#fbeef4 18px 36px),
      linear-gradient(135deg,var(--pink-soft),var(--green-soft));
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:14px;
  }

  .frame{
    width:720px;
    flex:0 0 auto;
    align-self:center;
    height:fit-content;
    background:var(--pink);
    border-radius:34px;
    padding:10px;
    box-shadow:0 10px 40px rgba(232,143,178,.35);
  }

  .inner{
    background:var(--cream);
    border-radius:26px;
    overflow:hidden;
  }

  /* ---------- HEADER / HERO ---------- */
  .hero{
    padding:0;
    text-align:center;
    position:relative;
    border-bottom:3px dotted var(--pink-deep);
    background:var(--pink-soft);
  }
  .hero img.banner{
    display:block;
    width:100%;
    height:auto;
    margin-top: -20px;
    border-top-left-radius:22px;
    border-top-right-radius:22px;
  }
  .hero .fallback{
    padding:30px 24px 24px;
    background:
      repeating-linear-gradient(115deg,rgba(255,255,255,.5) 0 2px,transparent 2px 16px),
      linear-gradient(180deg,var(--blue-soft),var(--pink-soft));
  }
  .title{
    font-family:'Parisienne',cursive;
    font-size:clamp(44px,10vw,72px);
    color:var(--pink-deep);
    line-height:1;
    text-shadow:1px 2px 0 #fff, 2px 4px 4px rgba(232,143,178,.3);
  }
  .subtitle{
    margin-top:8px;
    font-size:clamp(12px,3.4vw,15px);
    color:var(--mauve);
    letter-spacing:.5px;
    font-weight:500;
    font-style:italic;
  }

  /* ---------- NAV ---------- */
  nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    padding:18px 16px;
    background:linear-gradient(180deg,var(--blue-soft),#fff);
  }

  nav button{
    font-family:'Quicksand',sans-serif;
    font-weight:600;
    font-size:clamp(12px,3.2vw,15px);
    color:var(--mauve);
    background:#fff;
    border:2px solid var(--pink);
    border-radius:30px;
    padding:9px 16px;
    cursor:pointer;
    display:flex;align-items:center;gap:7px;
    transition:.2s;
    box-shadow:0 3px 8px rgba(247,184,208,.4);
  }
  nav button:hover{background:var(--pink-soft);transform:translateY(-2px);}
  nav button.active{background:var(--pink);color:#fff;border-color:var(--pink-deep);}
  nav button:focus-visible{outline:3px solid var(--green-deep);outline-offset:2px;}
  nav .ico{font-size:15px;}

  /* ---------- LAYOUT ---------- */
  .content{
    display:grid;
    grid-template-columns:1fr 1.15fr;
    gap:18px;
    padding:22px 20px;
  }
  .content.single{grid-template-columns:1fr;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    border:2px dashed var(--pink);
    border-radius:20px;
    padding:18px 14px;
    background:linear-gradient(180deg,#fff,var(--pink-soft));
    text-align:center;
  }
  .side-title{
    font-family:'Parisienne',cursive;
    font-size:34px;color:var(--mauve);
    margin-bottom:4px;
  }
  .hearts{color:var(--pink-deep);letter-spacing:4px;font-size:13px;margin-bottom:12px;}

  .linkcard{
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Parisienne',cursive;
    font-size:26px;
    color:var(--mauve);
    text-decoration:none;
    background:
      radial-gradient(circle,rgba(255,255,255,.9) 2px,transparent 2px) 0 0/12px 12px,
      var(--pink);
    border:3px solid #fff;
    border-radius:16px;
    padding:12px 8px;
    margin-bottom:12px;
    box-shadow:0 4px 10px rgba(232,143,178,.35);
    transition:.2s;
  }
  .linkcard:hover{transform:scale(1.03) rotate(-1deg);}
  .linkcard.wa{
    background:
      radial-gradient(circle,rgba(255,255,255,.9) 2px,transparent 2px) 0 0/12px 12px,
      var(--green);
  }
  .linkcard.ig{
    background:
      radial-gradient(circle,rgba(255,255,255,.9) 2px,transparent 2px) 0 0/12px 12px,
      #f7d774;
  }
  .linkcard span.emo{font-size:22px;}

  .foot-emoji{font-size:44px;margin-top:6px;}

  /* ---------- MAIN PANEL ---------- */
  .panel{
    border:2px dashed var(--blue);
    border-radius:20px;
    padding:20px 18px;
    background:linear-gradient(180deg,#fff,var(--blue-soft));
  }
  .panel h2{
    font-family:'Parisienne',cursive;
    font-size:34px;
    color:#8fb8cf;
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;
  }
  .panel p{font-size:14px;line-height:1.75;margin-bottom:12px;color:var(--ink);}
  .divider{color:var(--pink-deep);text-align:center;letter-spacing:5px;font-size:12px;margin:14px 0;}

  .price-item{
    display:flex;justify-content:space-between;align-items:center;
    background:#fff;border:2px solid var(--pink-soft);
    border-radius:14px;padding:11px 14px;margin-bottom:10px;font-size:14px;
  }
  .price-item b{color:var(--mauve);}
  .price-item .amt{color:var(--pink-deep);font-weight:700;white-space:nowrap;}

  /* grouped pricelist */
  .cat{
    border:2px solid var(--pink-soft);
    border-radius:16px;
    margin-bottom:12px;
    overflow:hidden;
    background:#fff;
  }
  .cat>summary{
    list-style:none;cursor:pointer;
    padding:12px 16px;
    font-weight:700;font-size:15px;color:var(--mauve);
    background:linear-gradient(180deg,#fff,var(--pink-soft));
    display:flex;align-items:center;gap:8px;
    user-select:none;
  }
  .cat>summary::-webkit-details-marker{display:none;}
  .cat>summary .arrow{margin-left:auto;transition:.2s;color:var(--pink-deep);}
  .cat[open]>summary .arrow{transform:rotate(90deg);}
  .cat>summary:focus-visible{outline:3px solid var(--green-deep);outline-offset:-3px;}
  .subcat{
    font-weight:700;font-size:13px;color:#8fb8cf;
    padding:10px 16px 4px;
    display:flex;align-items:center;gap:6px;
  }
  .taglist{
    display:flex;flex-wrap:wrap;gap:7px;
    padding:8px 16px 14px;
  }
  .taglist span{
    background:var(--pink-soft);
    border:1.5px solid var(--pink);
    color:var(--mauve);
    border-radius:20px;
    padding:5px 12px;
    font-size:13px;font-weight:600;
  }
  .taglist.green span{background:var(--green-soft);border-color:var(--green-deep);}
  .taglist.blue span{background:var(--blue-soft);border-color:var(--blue);}

  /* clickable subcategory chips */
  .taglist span{cursor:pointer;transition:.15s;}
  .taglist span:hover{transform:translateY(-2px);box-shadow:0 3px 7px rgba(232,143,178,.35);}
  .taglist span:focus-visible{outline:3px solid var(--green-deep);outline-offset:2px;}

  /* detail page */
  .backbtn{
    display:inline-flex;align-items:center;gap:6px;
    background:#fff;border:2px solid var(--pink);
    color:var(--mauve);font-weight:600;font-size:14px;
    border-radius:24px;padding:8px 16px;margin-bottom:16px;
    cursor:pointer;font-family:'Quicksand',sans-serif;
    box-shadow:0 3px 7px rgba(247,184,208,.4);transition:.2s;
  }
  .backbtn:hover{background:var(--pink-soft);transform:translateX(-3px);}
  .backbtn:focus-visible{outline:3px solid var(--green-deep);outline-offset:2px;}

  .pcard{
    background:#fff;
    border:2px solid var(--pink-soft);
    border-radius:18px;
    padding:14px 16px;
    margin-bottom:14px;
    box-shadow:0 3px 10px rgba(232,143,178,.15);
  }
  .pcard h3{
    font-family:'Parisienne',cursive;
    font-size:26px;color:var(--pink-deep);
    margin-bottom:4px;line-height:1.1;
  }
  .pcard .note-tag{
    display:inline-block;font-size:11px;font-weight:600;
    color:var(--mauve);background:var(--green-soft);
    border-radius:12px;padding:2px 9px;margin-bottom:8px;
  }
  .prow{
    display:flex;justify-content:space-between;align-items:baseline;
    gap:10px;padding:7px 0;border-bottom:1px dashed var(--pink-soft);
    font-size:14px;
  }
  .prow:last-child{border-bottom:none;}
  .prow .lbl{color:var(--ink);}
  .prow .price{color:var(--pink-deep);font-weight:700;white-space:nowrap;}
  .pnotes{
    font-size:12.5px;line-height:1.7;color:var(--mauve);
    background:var(--blue-soft);border-radius:12px;
    padding:10px 14px;margin-top:8px;
  }
  .pnotes b{color:var(--pink-deep);}

  .tnc-list{list-style:none;font-size:14px;line-height:1.7;}
  .tnc-list li{
    padding:9px 0 9px 26px;position:relative;
    border-bottom:1px dashed var(--pink-soft);
  }
  .tnc-list li:before{content:"🍓";position:absolute;left:0;top:8px;font-size:13px;}
  .tnc-list li:last-child{border-bottom:none;}


  .emoji-icon{
  height:1.15em;
  width:1.15em;
  object-fit:contain;
  vertical-align:-0.2em;
  display:inline-block;
}
  /* ---------- FOOTER ---------- */
  footer{
    background:linear-gradient(180deg,var(--green-soft),var(--green));
    padding:18px 20px;
    display:flex;align-items:center;gap:12px;
    border-top:3px dotted var(--green-deep);
    flex-wrap:wrap;
  }
  .fbtns{display:flex;gap:8px;}
  .fbtns a{
    width:40px;height:40px;border-radius:50%;
    background:#fff;border:2px solid var(--green-deep);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;text-decoration:none;color:var(--mauve);
    box-shadow:0 3px 6px rgba(169,196,124,.4);transition:.2s;
  }
  .fbtns a:hover{transform:translateY(-2px);background:var(--green-soft);}
  .url{
    flex:1;min-width:180px;
    background:#fff;border:2px solid var(--pink);
    border-radius:24px;padding:11px 18px;
    color:var(--mauve);font-size:13px;text-align:center;
    letter-spacing:1px;
  }

  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .content{animation:fade .35s ease;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

             onerror="this.style.display='none';document.getElementById('hdrFallback').style.display='block';">

<script>
  // ---- edit your links here ----
  const DISCORD_URL = "https://discord.gg/eCrnnNS2KA";
  const WHATSAPP_URL = "https://wa.me/6283152855226";
  const INSTAGRAM_URL = "https://instagram.com/moriimise";

  const sidebar = `
    <div class="sidebar">
      <div class="side-title">Links</div>
      <div class="hearts">♡ ♡ ♡</div>
      <a class="linkcard" href="${DISCORD_URL}" target="_blank" rel="noopener">
        <span class="emo">🍡</span> Discord
      </a>
      <a class="linkcard wa" href="${WHATSAPP_URL}" target="_blank" rel="noopener">
        <span class="emo">🌿</span> WhatsApp
      </a>
      <a class="linkcard ig" href="${INSTAGRAM_URL}" target="_blank" rel="noopener">
        <span class="emo">🍥</span> Instagram
      </a>
      <div class="foot-emoji">🧺</div>
    </div>`;

  const tabs = {
    home: `
      <div class="panel">
        <h2>🌼 Welcome!</h2>
        <p>ノ﹒🐈 Hai, selamat datang di kedai Morii ..  ۫  + Morii siap membantu semua keperluan kamu mulai dari epprim, education needs, game needs, sampai socneeds! %1001 trusted ☘️ 
        <p>klik "🐾" di bawah untuk melihat proof ya

        <div class="divider">♡ ♡ ♡ ♡ ♡</div>
        <p>Sebelum order, kindly baca tnc dan cek atau tanya harga terlebih dahulu supaya saat tansaksi gaada problem (∩^o^)⊃━☆.</p>
        <p style="text-align:center;font-family:'Parisienne',cursive;font-size:26px;color:#8fb8cf;">handle with love &amp; care ♡</p>
      </div>`,

    about: `
      <div class="panel">
        <p>⢠⣯⢬⣷⡀⠀⠀⣴⡯⢌⣧ ᨓ ᨓ ᨓ ᨓ ᨓ ᨓ ᨓ 
       <br>⠸⣿⠀⠹⣷⠀⢸⡝⠀⢸⡿ ⊹ OPEN HOURS :: 👛
        <br> ⠻⣧⣀⣿⣦⣼⡁⣠⣿⠃🐾 8 pagi — bobo 🛌</p>

ꔫ   𓈒  📂 tiny note’s :: 🍡🪿
<p>ര . tidak melayani rush order/rude buyer
<br>ര . jangan spam/call || harap bersabar
<br>ര . dont expect stability from black market

<br>🧦 ᆺ 𝐻appy shopping, cutie ?! 🐾  𓈒  ֹ ੭

        <div class="divider">♡ ♡ ♡</div>
        kalau ada pertanyaan feel free to ask morii yap
      </div>`,

    tnc: `
      <div class="panel">
        <h2>🍃 Terms &amp; Conditions</h2>
        <ul class="tnc-list">
          <li>Ini black market, membeli berarti sudah memahami dan siap menerima resiko.</li>
          <li>Netflix &amp; Disney wajib mengisi form dengan jelas dan lengkap.</li>
          <li>Garansi hanya ketika backfree dan proses login (tidak termasuk incor oleh sistem) dengan proses maksimal 7 hari, jika lebih dari itu boleh rechat morii.</li>
          <li>Jika sudah order harap bersabar, proses dikerjakan sesuai antrian.</li>
          <li>Wajib baca tnc setelah orderan didrop ‼️</li>
          <li>No refund!</li>
        </ul>
        <div class="divider">♡ ♡ ♡</div>
        <p style="text-align:center;">with love, moriimise</p>
      </div>`
  };

  /* ============================================================
     PRICELIST DATA — edit prices here.
     Each subcategory has a list of app cards.
     Each card: { name, badge?, rows:[{lbl, price}], notes? }
     ============================================================ */

  let priceData = {};

  // helper: app with prices not filled in yet
  function appTBD(name){
    return { name, rows:[{lbl:"Harga", price:"chat morii dulu ya"}] };
  }

  const app = document.getElementById('app');
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // build the pricelist landing (categories + clickable subcategory chips)
  function pricelistLanding(){
    let cats = '';
    for(const [catKey,cat] of Object.entries(priceData)){
      let subs = '';
      for(const [subKey,sub] of Object.entries(cat.subs)){
        const color = sub.color ? ' '+sub.color : '';
        const chips = sub.apps.map(a=>
          `<span role="button" tabindex="0" data-cat="${catKey}" data-sub="${subKey}" data-app="${esc(a.name)}">${esc(a.name)}</span>`
        ).join('');
        subs += `<div class="subcat">${sub.title}</div><div class="taglist${color}">${chips}</div>`;
      }
      cats += `<details class="cat">
        <summary>${cat.title} <span class="arrow">›</span></summary>
        ${subs}
      </details>`;
    }
    return `<div class="panel">
      <h2>🧸 Pricelist</h2>
      <p style="font-size:13px;margin-bottom:14px;">Tap kategori untuk buka, lalu tap nama aplikasi untuk lihat harganya </p>
      ${cats}
      <div class="divider">♡ ♡ ♡</div>
      <p style="text-align:center;font-size:13px;">Belum nemu yang dicari? Chat Morii yap</p>
    </div>`;
  }

  // build a single app detail page
  function appDetail(catKey, subKey, appName){
    const sub = priceData[catKey].subs[subKey];
    const a = sub.apps.find(x=>x.name===appName) || sub.apps[0];
    const rows = a.rows.map(r=>
      `<div class="prow"><span class="lbl">${esc(r.lbl)}</span><span class="price">${esc(r.price)}</span></div>`
    ).join('');
    const badge = a.badge ? `<span class="note-tag">✓ ${esc(a.badge)}</span><br>` : '';
    const notes = a.notes ? `<div class="pnotes">${a.notes}</div>` : '';
    return `<div class="panel">
      <button class="backbtn" data-back="1">‹ kembali</button>
      <p style="font-size:12px;color:var(--mauve);margin-bottom:4px;">${sub.title}</p>
      <div class="pcard">
        <h3>${esc(a.name)}</h3>
        ${badge}
        ${rows}
        ${notes}
      </div>
      <p style="text-align:center;font-size:12.5px;color:var(--mauve);">Order lewat Discord / WhatsApp di menu Home ya!🐥</p>
    </div>`;
  }

  const tabsStatic = tabs; // home, about, tnc

  function render(tab){
    let body;
    if(tab==='price'){ body = pricelistLanding(); }
    else { body = tabsStatic[tab]; }
    app.innerHTML = `<div class="content"><div class="side">${sidebar}</div>${body}</div>`;
  }
  
  // load price data from data.json, then render
  fetch('data.json')
    .then(r => r.json())
    .then(data => { priceData = data; render('home'); })
    .catch(() => {
      priceData = {};
      render('home');
      const el = document.getElementById('app');
      if (el) el.insertAdjacentHTML('afterbegin',
        '<p style="text-align:center;color:#b06;padding:12px;">Gagal memuat harga. Coba refresh ya 🌷</p>');
    });

  // nav tabs
  document.querySelectorAll('nav button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelector('nav button.active').classList.remove('active');
      btn.classList.add('active');
      render(btn.dataset.tab);
    });
  });

  // delegated clicks for pricelist drill-down
  app.addEventListener('click', e=>{
    const chip = e.target.closest('[data-app]');
    if(chip){
      app.innerHTML = `<div class="content"><div class="side">${sidebar}</div>${appDetail(chip.dataset.cat, chip.dataset.sub, chip.dataset.app)}</div>`;
      app.scrollIntoView({behavior:'smooth',block:'start'});
      return;
    }
    if(e.target.closest('[data-back]')){ render('price'); }
  });
  // keyboard access on chips
  app.addEventListener('keydown', e=>{
    if((e.key==='Enter'||e.key===' ') && e.target.matches('[data-app]')){
      e.preventDefault(); e.target.click();
    }
  });
</script>
